name: Refresh latest video

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: latest-video
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Resolve latest video across channels
        run: node scripts/update-latest-video.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain latest-video.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add latest-video.json
            git commit -m "chore: refresh latest video"
            git push
          else
            echo "No change."
          fi
